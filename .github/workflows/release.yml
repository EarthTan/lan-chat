name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: lan-chat

jobs:
  # ── Create GitHub Release (draft) ───────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Draft Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  #  Linux x86_64
  # ═══════════════════════════════════════════════════════════════════════
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked --manifest-path src-tauri/Cargo.toml

      - name: Package
        run: |
          mkdir -p dist
          cp src-tauri/target/release/$APP_NAME dist/
          tar -czf "$APP_NAME-linux-x86_64.tar.gz" -C dist .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.APP_NAME }}-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  #  macOS x86_64
  # ═══════════════════════════════════════════════════════════════════════
  build-macos-x64:
    needs: create-release
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-x64-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked --manifest-path src-tauri/Cargo.toml --target x86_64-apple-darwin

      - name: Bundle .app
        env:
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          BIN="src-tauri/target/x86_64-apple-darwin/release/${APP_NAME}"
          APP_DIR="${APP_NAME}.app"

          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          cp "$BIN" "$APP_DIR/Contents/MacOS/${APP_NAME}"
          cp src-tauri/icons/icon.icns "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>LAN Chat</string>
              <key>CFBundleIdentifier</key>
              <string>com.lanchat.app</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          chmod +x "$APP_DIR/Contents/MacOS/${APP_NAME}"

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "LAN Chat" \
            --volicon "src-tauri/icons/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 150 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 450 190 \
            "dist/${APP_NAME}-macos-x86_64.dmg" \
            "${APP_NAME}.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ env.APP_NAME }}-macos-x86_64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  #  macOS aarch64 (Apple Silicon)
  # ═══════════════════════════════════════════════════════════════════════
  build-macos-arm:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-arm-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin

      - name: Bundle .app
        env:
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          BIN="src-tauri/target/aarch64-apple-darwin/release/${APP_NAME}"
          APP_DIR="${APP_NAME}.app"

          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          cp "$BIN" "$APP_DIR/Contents/MacOS/${APP_NAME}"
          cp src-tauri/icons/icon.icns "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>LAN Chat</string>
              <key>CFBundleIdentifier</key>
              <string>com.lanchat.app</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          chmod +x "$APP_DIR/Contents/MacOS/${APP_NAME}"

          # Ad-hoc codesign required for Apple Silicon apps
          codesign --force --deep --sign - "$APP_DIR"

      - name: Create DMG
        env:
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "LAN Chat" \
            --volicon "src-tauri/icons/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 150 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 450 190 \
            "dist/${APP_NAME}-macos-aarch64.dmg" \
            "${APP_NAME}.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ env.APP_NAME }}-macos-aarch64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  #  Windows x86_64
  # ═══════════════════════════════════════════════════════════════════════
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked --manifest-path src-tauri/Cargo.toml

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "src-tauri\target\release\$env:APP_NAME.exe" "dist\"
          Compress-Archive -Path "dist\*" -DestinationPath "$env:APP_NAME-windows-x86_64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.APP_NAME }}-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  #  Publish release (remove draft status after all artifacts uploaded)
  # ═══════════════════════════════════════════════════════════════════════
  publish-release:
    needs:
      - build-linux
      - build-macos-x64
      - build-macos-arm
      - build-windows
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        run: |
          echo "All builds completed. Publishing release..."
        # fail if any required job failed
      - name: Publish Release
        if: |
          needs.build-linux.result == 'success' &&
          needs.build-macos-x64.result == 'success' &&
          needs.build-macos-arm.result == 'success' &&
          needs.build-windows.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
