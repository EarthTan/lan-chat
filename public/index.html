<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    * { -webkit-font-smoothing: antialiased; box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

    /* Scrollbar */
    #msgs::-webkit-scrollbar { width: 4px; }
    #msgs::-webkit-scrollbar-thumb { background: #2d2d2d; border-radius: 2px; }
    #msgs::-webkit-scrollbar-track { background: transparent; }

    /* Message entrance */
    @keyframes msgUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-anim { animation: msgUp 0.14s ease-out; }

    /* Bubble geometry */
    .bbl-me   { background: #2563eb; border-radius: 18px 4px 18px 18px; }
    .bbl-them { background: #1f1f1f; border: 1px solid rgba(255,255,255,0.07);
                border-radius: 4px 18px 18px 18px; }
    .bbl-clip { background: rgba(109,40,217,0.18);
                border: 1px solid rgba(139,92,246,0.28);
                border-radius: 18px; }

    /* Setup screen slide-out */
    #setup { transition: opacity 0.25s ease, transform 0.25s ease; }
    #setup.hide { opacity: 0; pointer-events: none; transform: scale(0.97); }
  </style>
</head>
<body class="bg-[#0c0c0c] text-white flex flex-col h-full">

  <!-- ── Setup overlay ── -->
  <div id="setup" class="fixed inset-0 z-50 bg-[#0c0c0c] flex flex-col items-center justify-center p-8">
    <div class="w-full max-w-[300px] flex flex-col items-center gap-6">
      <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-2xl shadow-lg shadow-blue-900/40">
        💬
      </div>
      <div class="text-center">
        <h1 class="text-xl font-bold tracking-tight mb-1">LAN Chat</h1>
        <p class="text-gray-500 text-xs">纯局域网 · 无外部服务器 · 零配置</p>
      </div>
      <div class="w-full space-y-2">
        <label class="text-[11px] font-medium text-gray-500 uppercase tracking-widest">给这台设备起个名字</label>
        <input id="nameIn" type="text" maxlength="24" autocomplete="off"
          class="w-full bg-white/[0.05] border border-white/10 focus:border-blue-500/60 rounded-xl px-4 py-3
                 text-sm text-center outline-none placeholder-gray-700 transition-colors caret-blue-400"
          placeholder="例如：Alex 的 Mac">
        <button id="startBtn" onclick="saveName()"
          class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white text-sm font-semibold
                 py-3 rounded-xl transition-all duration-150 shadow-lg shadow-blue-900/30">
          开始聊天 →
        </button>
      </div>
    </div>
  </div>

  <!-- ── Header ── -->
  <header class="shrink-0 h-[52px] bg-[#141414] border-b border-white/[0.05] px-4 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <div class="relative shrink-0">
        <div class="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-xs">💬</div>
        <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-emerald-400 rounded-full border-2 border-[#141414]"></span>
      </div>
      <span class="font-semibold text-[15px] truncate">LAN Chat</span>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <span id="myBadge"
        class="text-[11px] text-gray-500 bg-white/[0.05] border border-white/[0.07] rounded-full px-2.5 py-0.5 max-w-[96px] truncate"></span>
      <button onclick="openClip()"
        class="flex items-center gap-1.5 text-[11px] text-gray-400 hover:text-violet-300
               bg-white/[0.05] hover:bg-violet-900/25 border border-white/[0.07] hover:border-violet-500/30
               rounded-full px-3 py-1.5 transition-all duration-150 select-none">
        <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="hidden xs:inline">分享剪贴板</span>
      </button>
    </div>
  </header>

  <!-- ── Message list ── -->
  <main id="msgs" class="flex-1 overflow-y-auto px-3 py-4 flex flex-col gap-2 scroll-smooth">
    <div id="empty"
      class="m-auto flex flex-col items-center gap-3 text-center opacity-25 pointer-events-none select-none">
      <div class="text-4xl">📡</div>
      <p class="text-sm text-gray-400 leading-relaxed">
        在其他设备的浏览器中打开本机 IP<br>
        <span class="font-mono text-xs text-gray-600">http://&lt;Ubuntu-IP&gt;:4242</span>
      </p>
    </div>
  </main>

  <!-- ── Input bar ── -->
  <footer class="shrink-0 bg-[#141414] border-t border-white/[0.05] p-3">
    <div class="flex items-center gap-2.5 bg-white/[0.04] border border-white/[0.07]
                focus-within:border-blue-500/35 rounded-2xl px-4 py-2.5 transition-colors duration-200">
      <input id="inp" type="text" autocomplete="off" spellcheck="false"
        placeholder="输入消息，Enter 发送…"
        class="flex-1 bg-transparent outline-none text-sm text-white placeholder-gray-700 min-w-0 caret-blue-400"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
      <button onclick="sendMsg()"
        class="shrink-0 text-blue-500 hover:text-blue-400 active:scale-90 transition-all duration-100">
        <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="currentColor">
          <path d="m3.478 2.405-2.44 16.374c-.168 1.38.97 2.35 2.23 1.75l17.5-8.33
                   c1.18-.56 1.18-2.24 0-2.8L3.3 1.07C2.04.47.9 1.44 1.04 2.81l.24 1.6zm1.67 11.84
                   L3.8 5.33l12.7 6.04-11.35.87z"/>
        </svg>
      </button>
    </div>
  </footer>

  <!-- ── Clipboard modal ── -->
  <div id="clipModal"
    class="hidden fixed inset-0 z-40 bg-black/65 backdrop-blur-sm flex items-end sm:items-center justify-center p-4"
    onclick="if(event.target===this)closeClip()">
    <div class="w-full max-w-md bg-[#1a1a1a] border border-white/[0.09] rounded-2xl p-5 space-y-4 shadow-2xl">

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 text-sm font-semibold">
          <span class="text-violet-400 text-base">📋</span>
          分享剪贴板内容
        </div>
        <button onclick="closeClip()"
          class="w-7 h-7 flex items-center justify-center rounded-full text-gray-600 hover:text-gray-300
                 hover:bg-white/10 transition-colors text-lg leading-none">×</button>
      </div>

      <textarea id="clipTA" rows="6"
        placeholder="在此粘贴内容（Ctrl+V / ⌘+V）…&#10;&#10;支持代码、URL、任意文本。&#10;内容将以紫色气泡发送给所有在线设备。"
        class="w-full bg-black/40 border border-white/[0.08] focus:border-violet-500/50 rounded-xl
               px-4 py-3 text-sm outline-none resize-none text-white/90 placeholder-gray-700
               font-mono leading-relaxed transition-colors"></textarea>

      <div class="flex items-center justify-between">
        <span class="text-[11px] text-gray-600">仅局域网内传输，不经过任何服务器</span>
        <div class="flex gap-2">
          <button onclick="closeClip()"
            class="text-sm text-gray-500 hover:text-gray-200 px-4 py-2 rounded-lg transition-colors">
            取消
          </button>
          <button onclick="sendClip()"
            class="text-sm bg-violet-600 hover:bg-violet-500 active:scale-95 text-white
                   font-semibold px-5 py-2 rounded-lg transition-all duration-150 shadow-lg shadow-violet-900/30">
            发送
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast"
    class="fixed bottom-[72px] left-1/2 -translate-x-1/2 z-50 pointer-events-none
           bg-[#242424] border border-white/10 text-xs text-gray-200
           px-4 py-2 rounded-full shadow-xl opacity-0 transition-opacity duration-200 whitespace-nowrap"></div>

  <script>
  // ────────────────────────────────────────────────────────
  const socket = io();
  let ME = '';
  const txtById = {};   // id → raw text (for copy)

  // ── Init ─────────────────────────────────────────────────
  addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('lc-name');
    if (saved) {
      ME = saved;
      document.getElementById('myBadge').textContent = ME;
      document.getElementById('setup').classList.add('hide');
    } else {
      const ua = navigator.userAgent;
      let hint = '我的设备';
      if (/Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) hint = 'Alex 的 Mac';
      else if (/Linux/.test(ua))   hint = 'Ubuntu';
      else if (/Windows/.test(ua)) hint = '我的 PC';
      document.getElementById('nameIn').value = hint;
      document.getElementById('nameIn').select();
    }
  });

  function saveName() {
    const v = document.getElementById('nameIn').value.trim();
    if (!v) { document.getElementById('nameIn').focus(); return; }
    ME = v;
    localStorage.setItem('lc-name', ME);
    document.getElementById('myBadge').textContent = ME;
    const s = document.getElementById('setup');
    s.classList.add('hide');
    setTimeout(() => s.style.display = 'none', 300);
    document.getElementById('inp').focus();
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('nameIn').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });
  });

  // ── Socket ────────────────────────────────────────────────
  socket.on('history', msgs => {
    msgs.forEach(m => render(m, false));
    scrollBottom();
  });
  socket.on('message', msg => {
    render(msg, true);
    scrollBottom();
  });

  // ── Send text ─────────────────────────────────────────────
  function sendMsg() {
    if (!ME) { toast('请先设置设备名称'); return; }
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    socket.emit('message', { text, device: ME, type: 'text' });
    inp.value = '';
  }

  // ── Clipboard modal ───────────────────────────────────────
  function openClip() {
    document.getElementById('clipModal').classList.remove('hidden');
    const ta = document.getElementById('clipTA');
    // Try auto-read (works only on localhost or HTTPS due to browser policy)
    if (navigator.clipboard?.readText) {
      navigator.clipboard.readText()
        .then(t => { if (t) ta.value = t; })
        .catch(() => {});
    }
    setTimeout(() => ta.focus(), 60);
  }
  function closeClip() {
    document.getElementById('clipModal').classList.add('hidden');
    document.getElementById('clipTA').value = '';
  }
  function sendClip() {
    if (!ME) { toast('请先设置设备名称'); return; }
    const text = document.getElementById('clipTA').value.trim();
    if (!text) { toast('内容不能为空'); return; }
    socket.emit('message', { text, device: ME, type: 'clipboard' });
    closeClip();
    toast('📋 剪贴板已发送');
  }
  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeClip();
  });

  // ── Copy ─────────────────────────────────────────────────
  async function copyById(id, el) {
    const text = txtById[id] ?? '';
    try {
      await navigator.clipboard.writeText(text);
      toast('✓ 已复制到剪贴板');
      el.textContent = '✓';
      setTimeout(() => el.textContent = '复制', 1500);
    } catch { toast('复制失败'); }
  }

  // ── Render message ────────────────────────────────────────
  function render(msg, animate) {
    txtById[msg.id] = msg.text;

    const emEl = document.getElementById('empty');
    if (emEl) emEl.remove();

    const isMe   = msg.device === ME;
    const isClip = msg.type === 'clipboard';
    const time   = new Date(msg.ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const esc    = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const bbl  = isClip ? 'bbl-clip' : isMe ? 'bbl-me' : 'bbl-them';
    const side = isMe ? 'items-end' : 'items-start';
    const cpPos = isMe ? '-left-1 -translate-x-full' : '-right-1 translate-x-full';
    const showCopy = !isMe || isClip;

    // Safe ID for inline onclick (no quotes in ID)
    const safeId = esc(msg.id);

    const wrap = document.createElement('div');
    wrap.className = `flex flex-col ${side} ${animate ? 'msg-anim' : ''}`;
    wrap.innerHTML = `
      <div class="text-[10px] text-gray-700 mb-1 px-1 select-none">
        ${esc(msg.device)} · ${time}
      </div>
      <div class="group relative" style="max-width:min(74%,440px)">
        ${isClip ? `
          <div class="text-[10px] text-violet-400 mb-1.5 flex items-center gap-1 ${isMe ? 'justify-end' : ''}">
            📋 剪贴板内容
          </div>` : ''}
        <div class="${bbl} px-4 py-2.5">
          <p class="text-sm text-white/90 whitespace-pre-wrap break-all leading-relaxed select-text">
            ${esc(msg.text)}
          </p>
        </div>
        ${showCopy ? `
          <button
            onclick="copyById('${safeId}', this)"
            class="absolute ${cpPos} top-1/2 -translate-y-1/2 px-2 py-1
                   opacity-0 group-hover:opacity-100 text-[10px] text-gray-600
                   hover:text-gray-300 transition-opacity whitespace-nowrap select-none">
            复制
          </button>` : ''}
      </div>`;
    document.getElementById('msgs').appendChild(wrap);
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      const m = document.getElementById('msgs');
      m.scrollTop = m.scrollHeight;
    });
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTm;
  function toast(text) {
    const el = document.getElementById('toast');
    el.textContent = text;
    el.style.opacity = '1';
    clearTimeout(toastTm);
    toastTm = setTimeout(() => el.style.opacity = '0', 2300);
  }
  // ────────────────────────────────────────────────────────
  </script>
</body>
</html>
