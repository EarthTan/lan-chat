<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>LAN-CHAT/0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg:      #0A0A0A;
      --bg-elev: #111211;
      --line:    #1F201D;
      --amber:   #FFB000;
      --green:   #7CFFB2;
      --text:    #D9D6CC;
      --muted:   #5C5D54;

      --mono: "JetBrains Mono", Menlo, Consolas, "Courier New", monospace,
              "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    input, textarea {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      outline: none;
      min-height: 44px;
    }

    :focus-visible {
      outline: 1px solid var(--amber);
      outline-offset: 2px;
    }

    /* ── Keyframes ─────────────────────────────────────────── */
    @keyframes blink {
      0%, 49.999% { opacity: 1; }
      50%, 100%   { opacity: 0; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-3px); }
      50%      { transform: translateX(3px); }
      75%      { transform: translateX(-2px); }
    }

    /* ── The signature caret ───────────────────────────────── */
    .caret {
      display: inline-block;
      width: 12px;
      height: 18px;
      background: var(--amber);
      vertical-align: text-bottom;
      animation: blink 1.06s steps(2) infinite;
    }
    .caret--breathe {
      animation: breathe 2.4s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .caret, .caret--breathe { animation: none; opacity: 0.85; }
    }

    /* ── Setup overlay ─────────────────────────────────────── */
    .setup-card {
      width: 100%;
      max-width: 460px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      padding: 28px 28px 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .setup-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .setup-head__rule {
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .setup-head__ver {
      font-size: 11px;
      color: var(--muted);
    }
    .setup-boot {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .boot-line {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
    }
    .boot-dots {
      display: inline-flex;
      gap: 2px;
    }
    .boot-dots span {
      animation: dots 1.2s steps(3) infinite;
      opacity: 0.25;
    }
    .boot-dots span:nth-child(2) { animation-delay: 0.2s; }
    .boot-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dots {
      0%, 60%, 100% { opacity: 0.25; }
      30%           { opacity: 1; }
    }
    .boot-tag {
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .boot-tag[data-state="ok"]   { color: var(--green); }
    .boot-tag[data-state="wait"] { color: var(--amber); }

    .setup-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: lowercase;
    }
    .setup-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      min-height: 44px;
    }
    .setup-input:focus-within { border-bottom-color: var(--amber); }
    .setup-prompt { color: var(--amber); font-weight: 500; }
    .setup-input input {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      color: var(--text);
      caret-color: transparent;
    }
    .setup-input.shake { animation: shake 120ms ease-in-out; }

    .setup-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .setup-hint {
      font-size: 11px;
      color: var(--muted);
    }
    .btn-primary {
      background: var(--amber);
      color: var(--bg);
      font-weight: 700;
      font-size: 12px;
      padding: 10px 14px;
      min-height: 44px;
      transition: filter 120ms ease-out;
    }
    .btn-primary:hover  { filter: brightness(1.1); }
    .btn-primary:active { transform: translateY(1px); }

    @media (prefers-reduced-motion: reduce) {
      .boot-dots span { animation: none; opacity: 0.6; }
    }

    /* ── Header ───────────────────────────────────────────── */
    .app-header {
      height: 40px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--line);
    }
    .app-header__left,
    .app-header__right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .online {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .online__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(124, 255, 178, 0.15);
    }
    .device-badge {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 4px 8px;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .clip-btn {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 0 12px;
      min-height: 44px;
      transition: color 120ms ease-out, border-color 120ms ease-out;
    }
    .clip-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
    }
    @media (max-width: 420px) {
      .online__label,
      .device-badge { display: none; }
      .clip-btn::before { content: '[ · ]'; }
      .clip-btn { font-size: 0; padding: 0 10px; }
      .clip-btn:hover::before { color: var(--amber); }
    }
  </style>
</head>
<body style="display:flex;flex-direction:column;">

  <!-- ── Setup overlay ── -->
  <div id="setup" style="z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:fixed;inset:0;">
    <div class="setup-card">
      <div class="setup-head">
        <span>LAN-CHAT/0</span>
        <span class="setup-head__rule"></span>
        <span class="setup-head__ver">v1.0.0</span>
      </div>

      <div class="setup-boot">
        <div class="boot-line" id="boot1">
          <span class="boot-msg">initializing p2p socket</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
        <div class="boot-line" id="boot2">
          <span class="boot-msg">binding 0.0.0.0:4242</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
        <div class="boot-line" id="boot3">
          <span class="boot-msg">awaiting peer handshake</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
      </div>

      <label class="setup-label" for="nameIn">identify this terminal:</label>
      <div class="setup-input" id="setupInputWrap">
        <span class="setup-prompt">›</span>
        <input id="nameIn" type="text" maxlength="24" autocomplete="off" spellcheck="false">
      </div>

      <div class="setup-foot">
        <span class="setup-hint">enter accepts · esc dismisses overlay</span>
        <div class="setup-actions">
          <button id="startBtn" type="button" class="btn-primary">[ ENTER ↵ ]   connect</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Header ── -->
  <header id="header" class="app-header">
    <div class="app-header__left">
      <span class="caret" aria-hidden="true"></span>
      <span class="brand">LAN-CHAT/0</span>
      <span class="online" aria-live="polite">
        <span class="online__dot" aria-hidden="true"></span>
        <span class="online__label">online</span>
      </span>
    </div>
    <div class="app-header__right">
      <span id="myBadge" class="device-badge">[anonymous]</span>
      <button id="clipBtn" type="button" class="clip-btn">[ CLIP ]</button>
    </div>
  </header>

  <!-- ── Message list ── -->
  <main id="msgs" class="flex-1 overflow-y-auto px-3 py-4 flex flex-col gap-2 scroll-smooth">
    <div id="empty"
      class="m-auto flex flex-col items-center gap-3 text-center opacity-25 pointer-events-none select-none">
      <div class="text-4xl">📡</div>
      <p class="text-sm text-gray-400 leading-relaxed">
        在其他设备的浏览器中打开本机 IP<br>
        <span class="font-mono text-xs text-gray-600">http://&lt;Ubuntu-IP&gt;:4242</span>
      </p>
    </div>
  </main>

  <!-- ── Input bar ── -->
  <footer class="shrink-0 bg-[#141414] border-t border-white/[0.05] p-3">
    <div class="flex items-center gap-2.5 bg-white/[0.04] border border-white/[0.07]
                focus-within:border-blue-500/35 rounded-2xl px-4 py-2.5 transition-colors duration-200">
      <input id="inp" type="text" autocomplete="off" spellcheck="false"
        placeholder="输入消息，Enter 发送…"
        class="flex-1 bg-transparent outline-none text-sm text-white placeholder-gray-700 min-w-0 caret-blue-400"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
      <button onclick="sendMsg()"
        class="shrink-0 text-blue-500 hover:text-blue-400 active:scale-90 transition-all duration-100">
        <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="currentColor">
          <path d="m3.478 2.405-2.44 16.374c-.168 1.38.97 2.35 2.23 1.75l17.5-8.33
                   c1.18-.56 1.18-2.24 0-2.8L3.3 1.07C2.04.47.9 1.44 1.04 2.81l.24 1.6zm1.67 11.84
                   L3.8 5.33l12.7 6.04-11.35.87z"/>
        </svg>
      </button>
    </div>
  </footer>

  <!-- ── Clipboard modal ── -->
  <div id="clipModal"
    class="hidden fixed inset-0 z-40 bg-black/65 backdrop-blur-sm flex items-end sm:items-center justify-center p-4"
    onclick="if(event.target===this)closeClip()">
    <div class="w-full max-w-md bg-[#1a1a1a] border border-white/[0.09] rounded-2xl p-5 space-y-4 shadow-2xl">

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 text-sm font-semibold">
          <span class="text-violet-400 text-base">📋</span>
          分享剪贴板内容
        </div>
        <button onclick="closeClip()"
          class="w-7 h-7 flex items-center justify-center rounded-full text-gray-600 hover:text-gray-300
                 hover:bg-white/10 transition-colors text-lg leading-none">×</button>
      </div>

      <textarea id="clipTA" rows="6"
        placeholder="在此粘贴内容（Ctrl+V / ⌘+V）…&#10;&#10;支持代码、URL、任意文本。&#10;内容将以紫色气泡发送给所有在线设备。"
        class="w-full bg-black/40 border border-white/[0.08] focus:border-violet-500/50 rounded-xl
               px-4 py-3 text-sm outline-none resize-none text-white/90 placeholder-gray-700
               font-mono leading-relaxed transition-colors"></textarea>

      <div class="flex items-center justify-between">
        <span class="text-[11px] text-gray-600">仅局域网内传输，不经过任何服务器</span>
        <div class="flex gap-2">
          <button onclick="closeClip()"
            class="text-sm text-gray-500 hover:text-gray-200 px-4 py-2 rounded-lg transition-colors">
            取消
          </button>
          <button onclick="sendClip()"
            class="text-sm bg-violet-600 hover:bg-violet-500 active:scale-95 text-white
                   font-semibold px-5 py-2 rounded-lg transition-all duration-150 shadow-lg shadow-violet-900/30">
            发送
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast"
    class="fixed bottom-[72px] left-1/2 -translate-x-1/2 z-50 pointer-events-none
           bg-[#242424] border border-white/10 text-xs text-gray-200
           px-4 py-2 rounded-full shadow-xl opacity-0 transition-opacity duration-200 whitespace-nowrap"></div>

  <script>
  // ────────────────────────────────────────────────────────
  const socket = io();
  let ME = '';
  const txtById = {};   // id → raw text (for copy)

  // ── Init ─────────────────────────────────────────────────
  addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('lc-name');
    if (saved) {
      ME = saved;
      const badge = document.getElementById('myBadge');
      if (badge) badge.textContent = ME;
      document.getElementById('setup').style.display = 'none';
    } else {
      const ua = navigator.userAgent;
      let hint = '我的设备';
      if (/Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) hint = 'Alex 的 Mac';
      else if (/Linux/.test(ua))   hint = 'Ubuntu';
      else if (/Windows/.test(ua)) hint = '我的 PC';
      const inp = document.getElementById('nameIn');
      inp.value = hint;
      inp.focus();
      inp.setSelectionRange(hint.length, hint.length);

      // ── Boot sequence ────────────────────────────────────
      const tagFor  = id => document.querySelector(`#${id} .boot-tag`);
      const dotsFor = id => document.querySelectorAll(`#${id} .boot-dots span`);
      const setOk = id => {
        tagFor(id).textContent = '[ OK ]';
        tagFor(id).dataset.state = 'ok';
        dotsFor(id).forEach(d => d.style.animation = 'none');
      };
      setTimeout(() => setOk('boot1'), 120);
      setTimeout(() => setOk('boot2'), 240);
      // boot3 stays [..] until connect
      tagFor('boot3').dataset.state = 'wait';
    }
  });

  function saveName() {
    const inp  = document.getElementById('nameIn');
    const wrap = document.getElementById('setupInputWrap');
    const v    = inp.value.trim();
    if (!v) {
      wrap.classList.remove('shake');
      void wrap.offsetWidth;
      wrap.classList.add('shake');
      inp.focus();
      return;
    }
    ME = v;
    localStorage.setItem('lc-name', ME);
    const badge = document.getElementById('myBadge');
    if (badge) badge.textContent = ME;
    const s = document.getElementById('setup');
    s.style.transition = 'opacity 160ms ease-out';
    s.style.opacity = '0';
    setTimeout(() => s.style.display = 'none', 180);
    document.getElementById('inp').focus();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('startBtn');
    if (btn) btn.addEventListener('click', saveName);
    document.getElementById('nameIn').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });
  });

  // ── Socket ────────────────────────────────────────────────
  socket.on('history', msgs => {
    msgs.forEach(m => render(m, false));
    scrollBottom();
  });
  socket.on('message', msg => {
    render(msg, true);
    scrollBottom();
  });

  // ── Send text ─────────────────────────────────────────────
  function sendMsg() {
    if (!ME) { toast('请先设置设备名称'); return; }
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    socket.emit('message', { text, device: ME, type: 'text' });
    inp.value = '';
  }

  // ── Clipboard modal ───────────────────────────────────────
  function openClip() {
    document.getElementById('clipModal').classList.remove('hidden');
    const ta = document.getElementById('clipTA');
    // Try auto-read (works only on localhost or HTTPS due to browser policy)
    if (navigator.clipboard?.readText) {
      navigator.clipboard.readText()
        .then(t => { if (t) ta.value = t; })
        .catch(() => {});
    }
    setTimeout(() => ta.focus(), 60);
  }
  function closeClip() {
    document.getElementById('clipModal').classList.add('hidden');
    document.getElementById('clipTA').value = '';
  }
  function sendClip() {
    if (!ME) { toast('请先设置设备名称'); return; }
    const text = document.getElementById('clipTA').value.trim();
    if (!text) { toast('内容不能为空'); return; }
    socket.emit('message', { text, device: ME, type: 'clipboard' });
    closeClip();
    toast('📋 剪贴板已发送');
  }
  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeClip();
  });

  // ── Copy ─────────────────────────────────────────────────
  async function copyById(id, el) {
    const text = txtById[id] ?? '';
    try {
      await navigator.clipboard.writeText(text);
      toast('✓ 已复制到剪贴板');
      el.textContent = '✓';
      setTimeout(() => el.textContent = '复制', 1500);
    } catch { toast('复制失败'); }
  }

  // ── Render message ────────────────────────────────────────
  function render(msg, animate) {
    txtById[msg.id] = msg.text;

    const emEl = document.getElementById('empty');
    if (emEl) emEl.remove();

    const isMe   = msg.device === ME;
    const isClip = msg.type === 'clipboard';
    const time   = new Date(msg.ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const esc    = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const bbl  = isClip ? 'bbl-clip' : isMe ? 'bbl-me' : 'bbl-them';
    const side = isMe ? 'items-end' : 'items-start';
    const cpPos = isMe ? '-left-1 -translate-x-full' : '-right-1 translate-x-full';
    const showCopy = !isMe || isClip;

    // Safe ID for inline onclick (no quotes in ID)
    const safeId = esc(msg.id);

    const wrap = document.createElement('div');
    wrap.className = `flex flex-col ${side} ${animate ? 'msg-anim' : ''}`;
    wrap.innerHTML = `
      <div class="text-[10px] text-gray-700 mb-1 px-1 select-none">
        ${esc(msg.device)} · ${time}
      </div>
      <div class="group relative" style="max-width:min(74%,440px)">
        ${isClip ? `
          <div class="text-[10px] text-violet-400 mb-1.5 flex items-center gap-1 ${isMe ? 'justify-end' : ''}">
            📋 剪贴板内容
          </div>` : ''}
        <div class="${bbl} px-4 py-2.5">
          <p class="text-sm text-white/90 whitespace-pre-wrap break-all leading-relaxed select-text">
            ${esc(msg.text)}
          </p>
        </div>
        ${showCopy ? `
          <button
            onclick="copyById('${safeId}', this)"
            class="absolute ${cpPos} top-1/2 -translate-y-1/2 px-2 py-1
                   opacity-0 group-hover:opacity-100 text-[10px] text-gray-600
                   hover:text-gray-300 transition-opacity whitespace-nowrap select-none">
            复制
          </button>` : ''}
      </div>`;
    document.getElementById('msgs').appendChild(wrap);
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      const m = document.getElementById('msgs');
      m.scrollTop = m.scrollHeight;
    });
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTm;
  function toast(text) {
    const el = document.getElementById('toast');
    el.textContent = text;
    el.style.opacity = '1';
    clearTimeout(toastTm);
    toastTm = setTimeout(() => el.style.opacity = '0', 2300);
  }
  // ────────────────────────────────────────────────────────
  </script>
</body>
</html>
