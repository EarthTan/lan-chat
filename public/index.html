<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>LAN-CHAT/0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg:        #0A0A0A;
      --bg-elev:   #111211;
      --line:      #1F201D;
      --line-soft: #15160F;
      --amber:     #FFB000;
      --green:     #7CFFB2;
      --text:      #D9D6CC;
      --muted:     #5C5D54;

      /* Single easing — sharp in, gentle out. Everything transitions through this. */
      --ease: cubic-bezier(0.2, 0, 0, 1);

      --mono: "JetBrains Mono", Menlo, Consolas, "Courier New", monospace,
              "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    input, textarea {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      outline: none;
      min-height: 44px;
    }

    :focus-visible {
      outline: 1px solid var(--amber);
      outline-offset: 2px;
      transition: outline-offset 140ms var(--ease);
    }

    /* ── Keyframes ─────────────────────────────────────────── */
    @keyframes blink {
      0%, 49.999% { opacity: 1; }
      50%, 100%   { opacity: 0; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      50%      { transform: translateX(4px); }
      75%      { transform: translateX(-3px); }
    }
    @keyframes caretPulse {
      0%   { opacity: 0; transform: scaleY(0.4); }
      40%  { opacity: 1; transform: scaleY(1); }
      100% { opacity: 1; transform: scaleY(1); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 4px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ── The signature caret ───────────────────────────────── */
    .caret {
      display: inline-block;
      width: 12px;
      height: 18px;
      background: var(--amber);
      vertical-align: text-bottom;
      animation: blink 1.06s steps(2) infinite;
    }
    .caret--breathe {
      animation: breathe 2.4s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .caret, .caret--breathe { animation: none; opacity: 0.85; }
    }

    /* ── Setup overlay ─────────────────────────────────────── */
    .setup-card {
      width: 100%;
      max-width: 460px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      padding: 28px 28px 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .setup-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .setup-head__rule {
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .setup-head__ver {
      font-size: 11px;
      color: var(--muted);
    }
    .setup-boot {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .boot-line {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
    }
    .boot-dots {
      display: inline-flex;
      gap: 2px;
    }
    .boot-dots span {
      animation: dots 1.2s steps(3) infinite;
      opacity: 0.25;
    }
    .boot-dots span:nth-child(2) { animation-delay: 0.2s; }
    .boot-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dots {
      0%, 60%, 100% { opacity: 0.25; }
      30%           { opacity: 1; }
    }
    .boot-tag {
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .boot-tag[data-state="ok"]   { color: var(--green); }
    .boot-tag[data-state="wait"] { color: var(--amber); }

    .setup-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: lowercase;
    }
    .setup-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      min-height: 44px;
    }
    .setup-input:focus-within { border-bottom-color: var(--amber); }
    .setup-prompt { color: var(--amber); font-weight: 500; }
    .setup-input input {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      color: var(--text);
      caret-color: transparent;
    }
    .setup-input.shake { animation: shake 240ms var(--ease); }

    .setup-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .setup-hint {
      font-size: 11px;
      color: var(--muted);
    }
    .btn-primary {
      background: var(--amber);
      color: var(--bg);
      font-weight: 700;
      font-size: 12px;
      padding: 10px 14px;
      min-height: 44px;
      transition: filter 140ms var(--ease), transform 140ms var(--ease);
    }
    .btn-primary:hover  { filter: brightness(1.1); }
    .btn-primary:active { transform: translateY(1px); }

    @media (prefers-reduced-motion: reduce) {
      .boot-dots span { animation: none; opacity: 0.6; }
    }

    /* ── Header ───────────────────────────────────────────── */
    .app-header {
      height: 40px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--line);
    }
    .app-header__left,
    .app-header__right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .online {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .online__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(124, 255, 178, 0.15);
    }
    .device-badge {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 4px 8px;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .clip-btn {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 0 12px;
      min-height: 44px;
      transition: color 140ms var(--ease), border-color 140ms var(--ease);
    }
    .clip-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
    }
    /* The header caret is the brand glyph in its resting state. */
    .app-header__left .caret { transform-origin: bottom; }
    .app-header__left .caret--enter { animation: caretPulse 260ms var(--ease) both; }
    @media (max-width: 420px) {
      .online__label,
      .device-badge { display: none; }
      .clip-btn::before { content: '[ · ]'; }
      .clip-btn { font-size: 0; padding: 0 10px; }
      .clip-btn:hover::before { color: var(--amber); }
    }

    /* ── Log region ───────────────────────────────────────── */
    .log {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px 24px;
      scroll-behavior: smooth;
    }
    .log::-webkit-scrollbar         { width: 4px; }
    .log::-webkit-scrollbar-thumb   { background: var(--line); }
    .log::-webkit-scrollbar-track   { background: transparent; }

    .log-empty {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
      user-select: none;
    }
    .log-empty__line {
      margin: 0;
      font-size: 13px;
    }
    .log-empty__host {
      font-size: 12px;
    }
    .log-empty__block {
      margin-top: 28px;
      width: 64px;
      height: 64px;
    }

    /* ── Message rows ─────────────────────────────────────── */
    .row {
      display: block;
      padding: 6px 0 8px;
      border-bottom: 0;
    }
    .row + .row { margin-top: 0; }
    .row--in { animation: rowIn 160ms var(--ease) both; }
    .row--in .row__head  { animation: rowIn 160ms var(--ease) 40ms both; }
    .row--in .row__body  { animation: rowIn 180ms var(--ease) 90ms both; }

    .row__head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }
    .row__time   { letter-spacing: 0.02em; }
    .row__device { color: var(--muted); }
    .row__rule {
      flex: 1 1 auto;
      height: 1px;
      background: var(--line-soft);
      min-width: 12px;
    }
    .row__chip {
      font-size: 10px;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 0 5px;
      line-height: 14px;
      /* The [clip] chip gets an inner-dash pattern — feels more "pasted". */
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0 3px,
        rgba(124, 255, 178, 0.18) 3px 4px
      );
    }

    .row__body {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 4px 0 0 12px;
      color: var(--text);
      user-select: text;
    }
    .row__body a,
    .row__body .row__url {
      color: inherit;
      text-decoration: underline dotted var(--muted);
      text-underline-offset: 3px;
      cursor: pointer;
    }
    .row__body a:hover,
    .row__body .row__url:hover { text-decoration-style: solid; }

    /* The signature risk: outgoing rows are marked by the amber caret glyph
       aligned to the timestamp column. No avatar, no "you" label. */
    .row--me { position: relative; }
    .row--me .row__caret-mark {
      display: inline-block;
      width: 3px;
      height: 16px;
      background: var(--amber);
      vertical-align: text-bottom;
      margin-right: 8px;
      transform-origin: bottom;
      animation: caretPulse 220ms var(--ease) both;
    }

    .row--me   .row__body { color: var(--amber); }
    .row--clip .row__body {
      color: var(--green);
      font-feature-settings: "calt" 0, "liga" 0;
    }

    .row__meta {
      margin: 4px 0 0 12px;
      font-size: 10px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 140ms var(--ease);
    }
    .row:hover .row__meta { opacity: 1; }
    .row__meta-copy {
      cursor: pointer;
      transition: color 140ms var(--ease);
    }
    .row__meta-copy:hover { color: var(--amber); }
    .row__meta-copy[data-copied="1"] { color: var(--green); }

    /* ── Input bar — embedded in the log ────────────────── */
    .input-bar {
      flex: 0 0 auto;
      background: var(--bg);
      padding: 12px 20px 16px;
      position: relative;
    }
    /* The only separator from the log: a hairline that turns amber on focus. */
    .input-bar::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 0;
      height: 1px;
      background: var(--line);
      transition: background 140ms var(--ease);
    }
    .input-bar:focus-within::after { background: var(--amber); }

    .input-bar__row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 8px;
    }

    #inp {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 13px;
      color: var(--text);
      caret-color: var(--amber);
      padding: 2px 0;
      min-height: 22px;
      line-height: 1.55;
    }

    .input-bar__send {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      padding: 0;
      min-height: 44px;
      opacity: 0.25;
      transition: opacity 140ms var(--ease);
    }
    .input-bar__send[data-ready="1"] { opacity: 1; }

    .input-bar__count {
      flex: 0 0 auto;
      font-size: 11px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 140ms var(--ease);
      pointer-events: none;
    }
    .input-bar__count[data-show="1"] { opacity: 1; }
    .input-bar__count[data-warn="1"] { color: var(--amber); }
    /* ── Clipboard modal ───────────────────────────────────── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal[hidden] { display: none; }
    .modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .modal__sheet {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .modal__title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .modal__close {
      width: 28px;
      height: 28px;
      font-size: 18px;
      color: var(--muted);
      line-height: 1;
    }
    .modal__close:hover { color: var(--text); }

    .clip-ta {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px dashed var(--amber);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      resize: vertical;
      transition: border-style 120ms ease-out;
    }
    .clip-ta:focus { border-style: solid; }

    .modal__foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .modal__hint {
      font-size: 11px;
      color: var(--muted);
    }
    .modal__actions {
      display: flex;
      gap: 8px;
    }
    .btn-ghost {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      padding: 10px 12px;
      min-height: 44px;
      transition: color 140ms var(--ease);
    }
    .btn-ghost:hover { color: var(--text); }
    .clip-send { min-height: 44px; }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 88px;
      transform: translateX(-50%);
      z-index: 60;
      pointer-events: none;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      white-space: nowrap;
      opacity: 0;
    }
    .toast[data-show="1"] {
      animation: toastIn 180ms var(--ease) both;
    }
  </style>
</head>
<body style="display:flex;flex-direction:column;">

  <!-- ── Setup overlay ── -->
  <div id="setup" style="z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:fixed;inset:0;">
    <div class="setup-card">
      <div class="setup-head">
        <span>LAN-CHAT/0</span>
        <span class="setup-head__rule"></span>
        <span class="setup-head__ver">b.1.0.0</span>
      </div>

      <div class="setup-boot">
        <div class="boot-line" id="boot1">
          <span class="boot-msg">initializing p2p socket</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
        <div class="boot-line" id="boot2">
          <span class="boot-msg">binding 0.0.0.0:4242</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
        <div class="boot-line" id="boot3">
          <span class="boot-msg">awaiting peer handshake</span>
          <span class="boot-dots"><span>.</span><span>.</span><span>.</span></span>
          <span class="boot-tag" data-state="pending">[ .. ]</span>
        </div>
      </div>

      <label class="setup-label" for="nameIn">identify this terminal:</label>
      <div class="setup-input" id="setupInputWrap">
        <span class="setup-prompt">›</span>
        <input id="nameIn" type="text" maxlength="24" autocomplete="off" spellcheck="false">
      </div>

      <div class="setup-foot">
        <span class="setup-hint">enter accepts · esc dismisses overlay</span>
        <div class="setup-actions">
          <button id="startBtn" type="button" class="btn-primary">[ ENTER ↵ ]   connect</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Header ── -->
  <header id="header" class="app-header">
    <div class="app-header__left">
      <span class="caret" aria-hidden="true"></span>
      <span class="brand">LAN-CHAT/0</span>
      <span class="online" aria-live="polite">
        <span class="online__dot" aria-hidden="true"></span>
        <span class="online__label">online</span>
      </span>
    </div>
    <div class="app-header__right">
      <span id="myBadge" class="device-badge">[anonymous]</span>
      <button id="clipBtn" type="button" class="clip-btn">[ CLIP ]</button>
    </div>
  </header>

  <!-- ── Log region ── -->
  <main id="msgs" class="log" aria-live="polite" aria-label="message log">
    <div id="empty" class="log-empty">
      <p class="log-empty__line">no peers on the wire.</p>
      <p class="log-empty__line log-empty__host">listening on <span id="emptyHost">—</span></p>
      <span class="caret caret--breathe log-empty__block" aria-hidden="true"></span>
    </div>
  </main>

  <!-- ── Input bar ── -->
  <footer class="input-bar">
    <div class="input-bar__row">
      <input id="inp" type="text" autocomplete="off" spellcheck="false"
             aria-label="message">
      <span id="inpCount" class="input-bar__count" aria-hidden="true"></span>
      <button id="sendGlyph" type="button" class="input-bar__send" aria-label="send message">[ ↵ ]</button>
    </div>
  </footer>

  <!-- ── Clipboard modal ── -->
  <div id="clipModal" class="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="clipTitle">
      <header class="modal__head">
        <span class="modal__title" id="clipTitle">📋  CLIPBOARD.SHARE /tmp/peers</span>
        <button type="button" class="modal__close" data-close aria-label="close">×</button>
      </header>

      <textarea id="clipTA" class="clip-ta" rows="6" spellcheck="false"
        placeholder="paste anything — code, url, notes. ⌘V / Ctrl+V"></textarea>

      <footer class="modal__foot">
        <span class="modal__hint">no network egress · LAN only</span>
        <div class="modal__actions">
          <button id="clipCancel" type="button" class="btn-ghost" data-close>[ CANCEL ]</button>
          <button id="clipSend"   type="button" class="btn-primary clip-send">[ SEND ↵ ]</button>
        </div>
      </footer>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
  // ────────────────────────────────────────────────────────
  const socket = io();
  let ME = '';
  const txtById = {};   // id → raw text (for copy)

  // Reflect LAN/local host for the empty state.
  addEventListener('DOMContentLoaded', () => {
    const h = document.getElementById('emptyHost');
    if (h) h.textContent = window.location.host || 'localhost';
  });

  // ── Init ─────────────────────────────────────────────────
  // Boot helpers hoisted so socket.on('connect') can mark boot3 OK too.
  const bootTagFor  = id => document.querySelector(`#${id} .boot-tag`);
  const bootDotsFor = id => document.querySelectorAll(`#${id} .boot-dots span`);
  const bootSetOk = id => {
    const t = bootTagFor(id);
    if (!t) return;
    t.textContent = '[ OK ]';
    t.dataset.state = 'ok';
    bootDotsFor(id).forEach(d => d.style.animation = 'none');
  };

  addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('lc-name');
    if (saved) {
      ME = saved;
      const badge = document.getElementById('myBadge');
      if (badge) badge.textContent = ME;
      document.getElementById('setup').style.display = 'none';
    } else {
      // Default hint only on desktop — mobile gets an empty prompt.
      const isMobile = /Mobi|Android|iPhone|iPad/.test(navigator.userAgent);
      let hint = '';
      if (!isMobile) {
        const ua = navigator.userAgent;
        if (/Mac OS X/.test(ua))           hint = 'Alex 的 Mac';
        else if (/Linux/.test(ua))         hint = 'Ubuntu';
        else if (/Windows/.test(ua))       hint = '我的 PC';
        else                               hint = '我的设备';
      }
      const inp = document.getElementById('nameIn');
      if (hint) {
        inp.value = hint;
        inp.setSelectionRange(hint.length, hint.length);
      } else {
        inp.placeholder = 'name this terminal';
      }
      inp.focus();

      // ── Boot sequence ────────────────────────────────────
      setTimeout(() => bootSetOk('boot1'), 120);
      setTimeout(() => bootSetOk('boot2'), 240);
      // boot3 stays [..] until the socket actually connects — see socket.on('connect') below.
      const t = bootTagFor('boot3');
      if (t) t.dataset.state = 'wait';
    }
  });

  function saveName() {
    const inp  = document.getElementById('nameIn');
    const wrap = document.getElementById('setupInputWrap');
    const v    = inp.value.trim();
    if (!v) {
      wrap.classList.remove('shake');
      void wrap.offsetWidth;
      wrap.classList.add('shake');
      inp.focus();
      return;
    }
    ME = v;
    localStorage.setItem('lc-name', ME);
    const badge = document.getElementById('myBadge');
    if (badge) badge.textContent = ME;
    const s = document.getElementById('setup');
    s.style.transition = 'opacity 160ms var(--ease)';
    s.style.opacity = '0';
    setTimeout(() => s.style.display = 'none', 180);
    // The header caret pulses in — the signature glyph coming online.
    const headCaret = document.querySelector('.app-header__left .caret');
    if (headCaret) {
      headCaret.classList.add('caret--enter');
      setTimeout(() => headCaret.classList.remove('caret--enter'), 320);
    }
    document.getElementById('inp').focus();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('startBtn');
    if (btn) btn.addEventListener('click', saveName);
    document.getElementById('nameIn').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });
  });

  // ── Socket ────────────────────────────────────────────────
  socket.on('connect', () => {
    const t = bootTagFor('boot3');
    if (t && t.dataset.state !== 'ok') bootSetOk('boot3');
  });
  socket.on('history', msgs => {
    msgs.forEach(m => render(m, false));
    scrollBottom();
  });
  socket.on('message', msg => {
    render(msg, true);
    scrollBottom();
  });

  // ── Send text ─────────────────────────────────────────────
  // IME composition: while the user is mid-composition (Chinese/Japanese input),
  // Enter must insert a candidate, not send. We track this with a flag.
  let imeComposing = false;

  function sendMsg() {
    if (!ME) { toast('set a terminal name first'); return; }
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    socket.emit('message', { text, device: ME, type: 'text' });
    inp.value = '';
    const send  = document.getElementById('sendGlyph');
    const count = document.getElementById('inpCount');
    send.dataset.ready = '0';
    count.dataset.show = '0';
  }

  addEventListener('DOMContentLoaded', () => {
    const inp   = document.getElementById('inp');
    const send  = document.getElementById('sendGlyph');
    const count = document.getElementById('inpCount');

    inp.addEventListener('compositionstart', () => { imeComposing = true; });
    inp.addEventListener('compositionend',   () => { imeComposing = false; });

    inp.addEventListener('input', () => {
      const len = inp.value.length;
      send.dataset.ready = len > 0 ? '1' : '0';
      // Surface a quiet char count once the message gets long.
      if (len >= 6000) {
        count.textContent = `${len} / 8000`;
        count.dataset.show = '1';
        count.dataset.warn = len > 7500 ? '1' : '0';
      } else {
        count.dataset.show = '0';
      }
    });

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && !imeComposing && !e.isComposing) {
        e.preventDefault();
        sendMsg();
      }
    });
    send.addEventListener('click', sendMsg);
  });

  // ── Clipboard modal ───────────────────────────────────────
  function openClip() {
    if (!ME) { toast('set a terminal name first'); return; }
    const modal = document.getElementById('clipModal');
    const ta    = document.getElementById('clipTA');
    modal.hidden = false;
    if (navigator.clipboard?.readText) {
      navigator.clipboard.readText()
        .then(t => { if (t) ta.value = t; })
        .catch(() => {});
    }
    setTimeout(() => ta.focus(), 60);
  }

  function closeClip() {
    const modal = document.getElementById('clipModal');
    const ta    = document.getElementById('clipTA');
    modal.hidden = true;
    if (ta) ta.value = '';
  }

  function sendClip() {
    if (!ME) { toast('set a terminal name first'); return; }
    const ta = document.getElementById('clipTA');
    const text = ta.value.trim();
    if (!text) { toast('nothing to send'); return; }
    socket.emit('message', { text, device: ME, type: 'clipboard' });
    closeClip();
    toast('transmitted');
  }

  addEventListener('DOMContentLoaded', () => {
    document.getElementById('clipBtn').addEventListener('click', openClip);
    document.getElementById('clipSend').addEventListener('click', sendClip);
    document.getElementById('clipCancel').addEventListener('click', closeClip);

    document.querySelectorAll('#clipModal [data-close]').forEach(el => {
      el.addEventListener('click', closeClip);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !document.getElementById('clipModal').hidden) closeClip();
    });
  });

  // ── Copy ─────────────────────────────────────────────────
  // Delegated handler — clicking the meta line on any row copies the raw text.
  addEventListener('click', async (e) => {
    const el = e.target.closest('.row__meta-copy');
    if (!el) return;
    const id = el.dataset.copyId;
    const text = txtById[id] ?? '';
    try {
      await navigator.clipboard.writeText(text);
      const prev = el.textContent;
      el.dataset.copied = '1';
      toast('copied');
      el.textContent = '✓ copied';
      setTimeout(() => {
        el.textContent = prev;
        delete el.dataset.copied;
      }, 1200);
    } catch {
      toast('copy failed');
    }
  });
  // Keyboard parity for the meta copy chip.
  addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const el = e.target.closest('.row__meta-copy');
    if (!el) return;
    e.preventDefault();
    el.click();
  });

  // ── Render message ────────────────────────────────────────
  // URL matcher: http(s)://... or www.... — conservative, no path-trailing punctuation.
  const URL_RE = /\b((?:https?:\/\/|www\.)[^\s<>"]+[^\s<>".])/gi;

  function linkify(text) {
    // Escape first, then replace URLs in the escaped string.
    const esc = s => s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const safe = esc(text);
    return safe.replace(URL_RE, m => {
      const href = /^https?:/i.test(m) ? m : `https://${m}`;
      return `<a href="${href}" target="_blank" rel="noopener noreferrer">${m}</a>`;
    });
  }

  function render(msg, animate) {
    txtById[msg.id] = msg.text;

    const emEl = document.getElementById('empty');
    if (emEl) emEl.remove();

    const isMe   = msg.device === ME;
    const isClip = msg.type === 'clipboard';
    const time   = new Date(msg.ts).toLocaleTimeString('zh-CN',
                      { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    const esc    = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    const safeId   = esc(msg.id);
    const shortId  = safeId.slice(-4);
    const bytes    = new Blob([msg.text]).size;
    const meta     = `id ${shortId} · ${bytes} B`;

    const role = isClip ? 'row--clip' : isMe ? 'row--me' : 'row--them';

    const row = document.createElement('article');
    row.className = `row ${role}${animate ? ' row--in' : ''}`;
    row.dataset.meta = meta;

    const clipChip  = isClip ? `<span class="row__chip">[clip]</span>` : '';
    const meMark    = isMe  ? `<span class="row__caret-mark" aria-label="sent from this device"></span>` : '';

    const headParts = [
      `<span class="row__time">[${esc(time)}]</span>`,
      meMark,
      `<span class="row__device">${esc(msg.device)}</span>`,
      clipChip,
      `<span class="row__rule" aria-hidden="true"></span>`,
    ].join('');

    row.innerHTML = `
      <header class="row__head">${headParts}</header>
      <div class="row__body">${isClip ? esc(msg.text) : linkify(msg.text)}</div>
      <div class="row__meta">
        <span class="row__meta-copy" role="button" tabindex="0"
              aria-label="copy message text" data-copy-id="${safeId}">${meta}</span>
      </div>
    `;
    document.getElementById('msgs').appendChild(row);
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      const m = document.getElementById('msgs');
      m.scrollTop = m.scrollHeight;
    });
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTm;
  function toast(text) {
    const el = document.getElementById('toast');
    el.textContent = text;
    // Restart the slide-in animation by toggling the attribute off-then-on.
    el.dataset.show = '0';
    // Force reflow so the next assignment re-triggers the animation.
    void el.offsetWidth;
    el.dataset.show = '1';
    clearTimeout(toastTm);
    toastTm = setTimeout(() => { el.dataset.show = '0'; }, 1800);
  }
  // ────────────────────────────────────────────────────────
  </script>
</body>
</html>
